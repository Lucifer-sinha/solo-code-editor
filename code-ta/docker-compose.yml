version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./server/user_files:/usr/src/app/user_files
      - ./server/sandbox:/usr/src/app/sandbox
      - ./server/problems:/usr/src/app/problems
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped
    networks:
      - judge-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_WS_URL=ws://localhost:5001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - judge-network

networks:
  judge-network:
    driver: bridge

volumes:
  user_files:
  sandbox:
  problems: 